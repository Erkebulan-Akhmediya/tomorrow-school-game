<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Educational Game</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="titleContainer">
    <h1 id="gameTitle">Educational Game</h1>
  </div>

  <canvas id="gameCanvas"></canvas>

  <img src="./assets/logos.png" id="logos" />

  <div id="overlay">
    <h2>Paused</h2>
    <button id="btnContinue">Continue</button>
    <button id="btnReload">Reload</button>
    <button id="btnShare">Share</button>
  </div>

  <dialog id="shareDialog">
    <form id="shareForm">
      <h3>Share Screenshot</h3>
      <input type="text" id="telegramUsername" placeholder="Telegram Username" required />
      <button type="submit" id="btnSendShare">Send</button>
      <button type="button" id="btnCancelShare">Cancel</button>
    </form>
  </dialog>

  <script src="config.js"></script>
  <script src="internal_conf.js"></script>
  <script src="assets.js"></script>
  <script src="input.js"></script>
  <script src="entities.js"></script>
  <script src="spawner.js"></script>
  <script src="collision.js"></script>
  <script src="renderer.js"></script>
  <script src="game.js"></script>

</body>

</html>
