<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Educational Game</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <canvas id="gameCanvas"></canvas>

  <button id="btnPause"><img src="./assets/icons/pause.svg" /></button>

  <div id="overlay">
    <h2>Paused</h2>
    <button id="btnContinue"><img src="./assets/icons/play.svg" /></button>
    <button id="btnReload"><img src="./assets/icons/reload.svg" /></button>
    <button id="btnShare"><img src="./assets/icons/share.svg" /></button>
  </div>

  <dialog id="shareDialog">
    <form id="shareForm">
      <h3>Поделиться скриншотом</h3>
      <img src="./assets/qr.png" width="300" />
      <p>1. введите свое имя пользователя в telegram (без @ в начале)</p>
      <p>2. нажмите "отправить"</p>
      <p>3. отсканируйте QR код, чтобы перейти к телеграм боту</p>
      <p>4. выберите комманду /photo из меню бота</p>
      <p>5. Дождитесь скриншота вашей игры от бота</p>
      <input type="text" id="telegramUsername" placeholder="Имя пользователя Telegram" required />
      <div>
        <button type="submit" id="btnSendShare">Отправить</button>
      <button type="button" id="btnCancelShare">Отмена</button>
      </div>
    </form>
  </dialog>

  <script src="config.js"></script>
  <script src="internal_conf.js"></script>
  <script src="assets.js"></script>
  <script src="input.js"></script>
  <script src="entities.js"></script>
  <script src="spawner.js"></script>
  <script src="collision.js"></script>
  <script src="renderer.js"></script>
  <script src="game.js"></script>

</body>

</html>
